<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>トットク — PC ファイラー モック</title>
    <style>
      :root {
        --accent: #185fa5;
        --accent-weak: #e8f0f9;
        --sel: #d8e6f6;
        --bg: #ffffff;
        --sidebar: #f1f2f4;
        --border: #e3e5e8;
        --text: #1a1d21;
        --muted: #6b7280;
        --faint: #9aa0a8;
        --red-bg: #fdecec;
        --red-fg: #c0392b;
        --amber-bg: #fdf4e3;
        --amber-fg: #a76b1b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        font-size: 13px;
      }
      .icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }
      .layout {
        display: flex;
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 236px;
        flex-shrink: 0;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        padding: 14px 10px;
        overflow: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        padding: 4px 8px 14px;
      }
      .brand img {
        height: 30px;
      }
      .sec-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--faint);
        padding: 12px 8px 4px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 8px;
        border-radius: 7px;
        color: var(--text);
        text-decoration: none;
        cursor: default;
      }
      .item .icon {
        color: var(--accent);
      }
      .item.active {
        background: var(--sel);
      }
      .item:not(.active):hover {
        background: #e7e9ec;
      }
      .item .grow {
        flex: 1;
      }
      .badge {
        font-size: 11px;
        color: #fff;
        background: var(--faint);
        border-radius: 10px;
        padding: 0 7px;
        min-width: 18px;
        text-align: center;
      }
      .badge.amber {
        background: #e0a13a;
      }
      .tree .item {
        padding-left: 8px;
      }
      .tree .child {
        padding-left: 30px;
      }
      .tri {
        width: 12px;
        color: var(--faint);
        font-size: 10px;
      }

      /* Main */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
      }
      .navbtns {
        display: flex;
        gap: 2px;
        color: var(--faint);
      }
      .navbtns .b {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
      }
      .navbtns .b.on {
        color: var(--text);
      }
      .navbtns .b.on:hover {
        background: #eef0f2;
      }
      .crumb {
        font-size: 15px;
        font-weight: 600;
      }
      .crumb .sep {
        color: var(--faint);
        margin: 0 6px;
        font-weight: 400;
      }
      .spacer {
        flex: 1;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #f0f1f3;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        color: var(--muted);
        width: 210px;
      }
      .search input {
        border: none;
        background: transparent;
        outline: none;
        font-size: 13px;
        width: 100%;
        color: var(--text);
      }
      .segment {
        display: flex;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      .segment .s {
        width: 32px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        background: #fff;
      }
      .segment .s.active {
        background: var(--accent);
        color: #fff;
      }
      .tbtn {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        padding: 7px 12px;
        font-weight: 600;
        cursor: pointer;
        color: var(--text);
      }
      .tbtn.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      /* List */
      .list {
        flex: 1;
        overflow: auto;
      }
      .col-head {
        display: grid;
        grid-template-columns: 1fr 150px 130px 150px;
        padding: 8px 20px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
        position: sticky;
        top: 0;
        background: #fff;
      }
      .col-head .r {
        text-align: right;
      }
      .rowitem {
        display: grid;
        grid-template-columns: 1fr 150px 130px 150px;
        align-items: center;
        padding: 9px 20px;
        border-bottom: 1px solid #f1f2f4;
        cursor: default;
      }
      .rowitem:hover {
        background: #f7f8fa;
      }
      .rowitem.sel {
        background: var(--sel);
      }
      .cell-name {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }
      .cell-name .icon {
        width: 20px;
        height: 20px;
      }
      .cell-name .folder {
        color: var(--accent);
      }
      .cell-name .file {
        color: var(--faint);
      }
      .cell-name .nm {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .muted {
        color: var(--muted);
      }
      .r {
        text-align: right;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .pill.red {
        background: var(--red-bg);
        color: var(--red-fg);
      }
      .pill.amber {
        background: var(--amber-bg);
        color: var(--amber-fg);
      }
      .fchip {
        font-size: 12px;
        color: var(--muted);
      }
      .statusbar {
        border-top: 1px solid var(--border);
        padding: 7px 20px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand"><img src="../../public/tottoku-gray.png" alt="とっとく" /></div>

        <div class="sec-label">よく使う項目</div>
        <a class="item active">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
          </svg>
          <span class="grow">ホーム</span>
        </a>
        <a class="item">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" />
          </svg>
          <span class="grow">期限が近い</span>
          <span class="badge amber">2</span>
        </a>
        <a class="item">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 14h4l2 3h6l2-3h4" /><path d="M5 14V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8" />
          </svg>
          <span class="grow">未分類</span>
          <span class="badge">3</span>
        </a>
        <a class="item">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8" /><path d="M3 3v5h5" /><path d="M12 8v4l3 2" />
          </svg>
          <span class="grow">最近追加</span>
        </a>

        <div class="sec-label">フォルダ</div>
        <div class="tree">
          <a class="item"><span class="tri">▸</span>
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">契約</span>
          </a>
          <a class="item"><span class="tri">▾</span>
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">保険</span>
          </a>
          <a class="item child">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">自動車</span>
          </a>
          <a class="item child">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">火災</span>
          </a>
          <a class="item"><span class="tri">▸</span>
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">長男</span>
          </a>
          <a class="item"><span class="tri">▸</span>
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" /></svg>
            <span class="grow">医療</span>
          </a>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <div class="toolbar">
          <div class="navbtns">
            <div class="b"><svg class="icon" viewBox="0 0 24 24"><path d="m15 6-6 6 6 6" /></svg></div>
            <div class="b on"><svg class="icon" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6" /></svg></div>
          </div>
          <div class="crumb">わが家の書類</div>
          <div class="spacer"></div>
          <div class="search">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
            <input placeholder="検索" />
          </div>
          <div class="segment">
            <div class="s"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
            <div class="s active"><svg class="icon" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></div>
          </div>
          <button class="tbtn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v3"/><path d="M16 15h6M19 12v6"/></svg>
            新規フォルダ
          </button>
          <button class="tbtn primary">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 15V3M7 8l5-5 5 5M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            書類を追加
          </button>
        </div>

        <div class="list">
          <div class="col-head">
            <div>名前</div>
            <div>フォルダ</div>
            <div>追加日</div>
            <div class="r">期限</div>
          </div>

          <!-- folders -->
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon folder" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
              <span class="nm">契約</span>
            </div>
            <div class="muted">—</div>
            <div class="muted">5件</div>
            <div class="r muted">—</div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon folder" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
              <span class="nm">保険</span>
            </div>
            <div class="muted">—</div>
            <div class="muted">8件</div>
            <div class="r muted">—</div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon folder" viewBox="0 0 24 24"><path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
              <span class="nm">長男</span>
            </div>
            <div class="muted">—</div>
            <div class="muted">3件</div>
            <div class="r muted">—</div>
          </div>

          <!-- documents -->
          <div class="rowitem sel">
            <div class="cell-name">
              <svg class="icon file" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
              <span class="nm">自動車保険 契約書</span>
            </div>
            <div class="fchip">保険 / 自動車</div>
            <div class="muted">2026/07/08</div>
            <div class="r"><span class="pill red">あと8日</span></div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon file" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
              <span class="nm">長男 保育園 継続届</span>
            </div>
            <div class="fchip">長男</div>
            <div class="muted">2026/07/02</div>
            <div class="r"><span class="pill amber">あと23日</span></div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon file" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
              <span class="nm">健康診断結果</span>
            </div>
            <div class="fchip">医療</div>
            <div class="muted">2026/07/09</div>
            <div class="r muted">—</div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon file" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
              <span class="nm">住民票</span>
            </div>
            <div class="fchip muted">未分類</div>
            <div class="muted">2026/07/05</div>
            <div class="r muted">—</div>
          </div>
          <div class="rowitem">
            <div class="cell-name">
              <svg class="icon file" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>
              <span class="nm">火災保険 証券</span>
            </div>
            <div class="fchip">保険 / 火災</div>
            <div class="muted">2026/06/20</div>
            <div class="r"><span class="pill amber">あと40日</span></div>
          </div>
        </div>

        <div class="statusbar">3 フォルダ・6 書類</div>
      </div>
    </div>
  </body>
</html>
