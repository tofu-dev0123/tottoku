<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>トットク — モバイル 通知 モック</title>
    <style>
      :root {
        --accent: #185fa5;
        --accent-weak: #e8f0f9;
        --bg: #f5f6f8;
        --card: #ffffff;
        --border: #e3e5e8;
        --text: #1a1d21;
        --muted: #6b7280;
        --faint: #9aa0a8;
        --red-bg: #fdecec;
        --red-fg: #c0392b;
        --amber-bg: #fdf4e3;
        --amber-fg: #a76b1b;
        --unread: #185fa5;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        font-size: 15px;
        -webkit-font-smoothing: antialiased;
      }
      .icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }
      .app {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Header */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px 10px;
      }
      .header-top {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .h-title {
        font-size: 20px;
        font-weight: 700;
        flex: 1;
      }
      .h-title .cnt {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: var(--red-fg);
        border-radius: 999px;
        padding: 1px 8px;
        margin-left: 8px;
        vertical-align: middle;
      }
      .read-all {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        background: none;
        border: none;
        padding: 6px 4px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .tab {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        background: #f0f1f3;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 6px 14px;
      }
      .tab.active {
        color: #fff;
        background: var(--accent);
      }

      /* List */
      .list {
        flex: 1;
        padding: 12px 12px 90px;
      }
      .day-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--faint);
        padding: 12px 6px 6px;
      }
      .card {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        position: relative;
      }
      .card.unread {
        border-color: #cfe0f2;
        background: #fbfdff;
      }
      .card.unread::before {
        content: "";
        position: absolute;
        top: 18px;
        left: -1px;
        width: 4px;
        height: 26px;
        border-radius: 0 4px 4px 0;
        background: var(--unread);
      }
      .av {
        width: 40px;
        height: 40px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .av.red {
        background: var(--red-bg);
        color: var(--red-fg);
      }
      .av.amber {
        background: var(--amber-bg);
        color: var(--amber-fg);
      }
      .av.blue {
        background: var(--accent-weak);
        color: var(--accent);
      }
      .av.name {
        font-weight: 700;
        font-size: 15px;
        background: #eef1f4;
        color: var(--muted);
      }
      .body {
        flex: 1;
        min-width: 0;
      }
      .b-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .b-title {
        font-weight: 600;
        font-size: 14px;
        flex: 1;
      }
      .b-time {
        font-size: 12px;
        color: var(--faint);
        flex-shrink: 0;
      }
      .b-desc {
        margin-top: 3px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }
      .doc-line {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 9px;
        padding: 8px 10px;
        background: #f6f7f9;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 500;
      }
      .doc-line .icon {
        width: 16px;
        height: 16px;
        color: var(--faint);
      }
      .doc-line .nm {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        margin-top: 9px;
      }
      .pill.red {
        background: var(--red-bg);
        color: var(--red-fg);
      }
      .pill.amber {
        background: var(--amber-bg);
        color: var(--amber-fg);
      }

      /* Bottom nav */
      .tabbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        background: var(--card);
        border-top: 1px solid var(--border);
        padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      }
      .tab-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 10px;
        color: var(--faint);
        position: relative;
      }
      .tab-item.active {
        color: var(--accent);
      }
      .tab-item .icon {
        width: 23px;
        height: 23px;
      }
      .tab-item .dot {
        position: absolute;
        top: -2px;
        right: 50%;
        transform: translateX(15px);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red-fg);
        border: 1.5px solid var(--card);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-top">
          <div class="h-title">通知<span class="cnt">3</span></div>
          <button class="read-all">
            <svg class="icon" viewBox="0 0 24 24" style="width: 16px; height: 16px">
              <path d="M4 12l5 5L20 6" />
            </svg>
            すべて既読
          </button>
        </div>
        <div class="tabs">
          <button class="tab active">すべて</button>
          <button class="tab">期限</button>
          <button class="tab">更新</button>
        </div>
      </header>

      <!-- List -->
      <main class="list">
        <div class="day-label">今日</div>

        <!-- 期限リマインド (赤) unread -->
        <div class="card unread">
          <div class="av red">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" />
            </svg>
          </div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">期限が近づいています</div>
              <div class="b-time">9:00</div>
            </div>
            <div class="b-desc">更新・提出の期限まであと 8 日です。</div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">自動車保険 契約書</span>
            </div>
            <span class="pill red">7/17 まで</span>
          </div>
        </div>

        <!-- アクティビティ 追加 (妻) unread -->
        <div class="card unread">
          <div class="av name">妻</div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">妻さんが書類を追加しました</div>
              <div class="b-time">8:12</div>
            </div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">健康診断結果</span>
            </div>
          </div>
        </div>

        <!-- 期限リマインド (黄) unread -->
        <div class="card unread">
          <div class="av amber">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" />
            </svg>
          </div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">期限が近づいています</div>
              <div class="b-time">9:00</div>
            </div>
            <div class="b-desc">更新・提出の期限まであと 23 日です。</div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">長男 保育園 継続届</span>
            </div>
            <span class="pill amber">7/25 まで</span>
          </div>
        </div>

        <div class="day-label">昨日</div>

        <!-- アクティビティ 更新 (夫) read -->
        <div class="card">
          <div class="av name">夫</div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">夫さんが書類を更新しました</div>
              <div class="b-time">昨日 21:30</div>
            </div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">火災保険 証券</span>
            </div>
          </div>
        </div>

        <!-- アクティビティ 追加 (妻) read -->
        <div class="card">
          <div class="av name">妻</div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">妻さんが書類を追加しました</div>
              <div class="b-time">昨日 14:05</div>
            </div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">住民票</span>
            </div>
          </div>
        </div>

        <div class="day-label">7月8日</div>

        <!-- 期限リマインド (青/情報) read -->
        <div class="card">
          <div class="av blue">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" /><path d="M12 8h.01M11 12h1v4h1" />
            </svg>
          </div>
          <div class="body">
            <div class="b-head">
              <div class="b-title">期限のお知らせ</div>
              <div class="b-time">9:00</div>
            </div>
            <div class="b-desc">更新・提出の期限まであと 40 日です。</div>
            <div class="doc-line">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
                <path d="M14 3v5h5" />
              </svg>
              <span class="nm">賃貸契約 更新書類</span>
            </div>
            <span class="pill amber">8/20 まで</span>
          </div>
        </div>
      </main>

      <!-- Bottom nav -->
      <nav class="tabbar">
        <div class="tab-item">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 10.5 12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z" />
          </svg>
          ホーム
        </div>
        <div class="tab-item">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 6a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z" />
          </svg>
          フォルダ
        </div>
        <div class="tab-item">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" />
          </svg>
          検索
        </div>
        <div class="tab-item active">
          <div class="dot"></div>
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.7 21a2 2 0 0 1-3.4 0" />
          </svg>
          通知
        </div>
        <div class="tab-item">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3.2" />
            <path
              d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H1a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 2.6 7a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H7a1.7 1.7 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V7a1.7 1.7 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"
            />
          </svg>
          設定
        </div>
      </nav>
    </div>
  </body>
</html>
