name: CI

on:
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        # env.ts が起動時に検証するためダミー値を渡す（ビルドは DB へ接続しない）
        env:
          DB_DRIVER: neon
          AUTH_SECRET: ci-dummy-secret
          AUTH_GOOGLE_ID: ci-dummy
          AUTH_GOOGLE_SECRET: ci-dummy
          AUTH_ALLOWED_EMAILS: ci@example.com
          DATABASE_URL: postgresql://user:pass@localhost:5432/tottoku
